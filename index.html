<html lang="en"> 
<head> 
  <meta charset="UTF-8" /> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0" /> 
  <title>Admin Dashboard</title> 
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"/> 
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"/> 
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> 
  <style> 
    .sidebar { 
      position: fixed; 
      top: 0; 
      left: 0; 
      height: 100%; 
      width: 250px; 
      background-color: #333; 
      padding-top: 60px; 
      color: #fff; 
    } 
    .sidebar ul { 
      list-style-type: none; 
      padding: 0; 
    } 
    .sidebar ul li { 
      padding: 12px; 
    } 
    .sidebar ul li:hover { 
      background-color: #555; 
    } 
    .sidebar ul li a { 
      color: white; 
      text-decoration: none; 
    } 
    .content { 
      margin-left: 250px; 
      padding: 20px; 
    } 
    .card { 
      border-radius: 10px; 
      box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
    } 
  </style> 
</head> 
<body> 
<!-- Sidebar --> 
<div class="sidebar"> 
  <ul> 
    <li><b>Dashboard</b></li> 
    <li><a href="product.html">Products</a></li> 
    <li><a href="orders.html">Orders</a></li> 
    <li><a href="customer.html">Customers</a></li> 
    <li><a href="about.html">About Us</a></li> 
  </ul> 
</div> 
 
<!-- Content --> 
<div class="content"> 
  <div class="container-fluid"> 
    <h1>Admin Dashboard</h1> 
    <hr> 
    <!-- Cards --> 
    <div class="row"> 
      <div class="col-md-6"> 
        <div class="card bg-primary text-white"> 
          <div class="card-body"> 
            <h5>Total Sales</h5> 
            <p id="totalSales">₹0</p> 
          </div> 
        </div> 
      </div> 
      <div class="col-md-6"> 
        <div class="card bg-success text-white"> 
          <div class="card-body"> 
            <h5>Total Orders</h5> 
            <p id="totalOrders">0</p> 
          </div> 
        </div> 
      </div> 
    </div> 
    <!-- Orders Table --> 
    <div class="card mt-3"> 
      <div class="card-body"> 
        <h5>Recent Orders</h5> 
        <table class="table table-striped"> 
          <thead> 
            <tr> 
              <th>ID</th> 
              <th>Name</th> 
              <th>Product</th> 
              <th>Qty</th> 
              <th>Total</th> 
            </tr> 
          </thead> 
          <tbody id="orderTable"></tbody> 
        </table> 
      </div> 
    </div> 
    <!-- Charts --> 
    <div class="row mt-4"> 
      <div class="col-md-6"> 
        <canvas id="salesChart"></canvas> 
      </div> 
      <div class="col-md-6"> 
        <canvas id="ordersChart"></canvas> 
      </div> 
    </div> 
  </div> 
</div> 
<!-- SCRIPT --> 
<script> 
function loadOrders() { 
  let orders = JSON.parse(localStorage.getItem("orders")) || []; 
  let table = document.getElementById("orderTable"); 
 
  table.innerHTML = ""; 
  let totalSales = 0; 
 
  orders.forEach((o, i) => { 
    totalSales += Number(o.total); 
 
    table.innerHTML += ` 
      <tr> 
        <td>${i+1}</td> 
        <td>${o.name}</td> 
        <td>${o.product}</td> 
        <td>${o.quantity}</td> 
       <td>₹${o.total}</td> 
      </tr> 
    `; 
  }); 
  document.getElementById("totalOrders").innerText = orders.length; 
  document.getElementById("totalSales").innerText = "₹" + totalSales; 
 
  return orders; 
} 
 
let orders = loadOrders(); 
 
// Labels 
let labels = orders.map((o, i) => "Order " + (i + 1)); 
 
// Sales Data (₹) 
let salesData = orders.map(o => Number(o.total)); 
// Orders Count Data (1,2,3...) 
let orderCountData = orders.map((o, i) => i + 1); 
//    SALES GRAPH (Sky Blue) 
new Chart(document.getElementById("salesChart"), { 
  type: "line", 
  data: { 
    labels: labels, 
    datasets: [{ 
      label: "Sales (₹)", 
      data: salesData, 
      borderColor: "skyblue", 
      backgroundColor: "skyblue", 
      fill: false, 
      tension: 0.4 
    }] 
  }, 
  options: { 
    scales: { 
      y: { 
        ticks: { 
          callback: function(value) { 
            return "₹" + value; 
          } 
        } 
      } 
    } 
  } 
}); 
 
//    ORDERS GRAPH (Count Increase) 
new Chart(document.getElementById("ordersChart"), { 
  type: "bar", 
  data: { 
    labels: labels, 
    datasets: [{ 
      label: "Number of Orders", 
      data: orderCountData, 
      backgroundColor: "skyblue" 
    }] 
  }, 
  options: { 
    scales: { 
      y: { 
        beginAtZero: true, 
        ticks: { 
          stepSize: 1 
        } 
      } 
    } 
  } 
}); 
</script> 
</body> 
</html>
